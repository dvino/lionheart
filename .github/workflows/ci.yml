name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release Tag (e.g., v1.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build all targets (CLI & Android)
        run: |
          chmod +x build.sh
          ./build.sh all

      - name: Check Secrets Availability
        id: check_secrets
        env:
          KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if[ -z "$KEYSTORE" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Dummy Keystore
        if: steps.check_secrets.outputs.has_key == 'false'
        id: dummy_keystore
        run: |
          keytool -genkeypair -v -keystore dummy.jks -keyalg RSA -keysize 2048 -validity 1 \
            -alias dummy -dname "CN=Dummy, OU=Dummy, O=Dummy, L=Dummy, S=Dummy, C=US" \
            -storepass dummypass -keypass dummypass
          
          BASE64_KEY=$(base64 -w 0 dummy.jks)
          echo "b64=$BASE64_KEY" >> "$GITHUB_OUTPUT"

      - name: Sign Android APK (Dummy Key)
        if: steps.check_secrets.outputs.has_key == 'false'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: output
          signingKeyBase64: ${{ steps.dummy_keystore.outputs.b64 }}
          alias: dummy
          keyStorePassword: dummypass
          keyPassword: dummypass

      - name: Sign Android APK (Production Key)
        if: steps.check_secrets.outputs.has_key == 'true'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: output
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.SIGN_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGN_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGN_KEY_PASSWORD }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lionheart-build
          path: output/
          retention-days: 14

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: Release ${{ inputs.version_tag }}
          files: output/*
          generate_release_notes: true
